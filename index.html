<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      /* Hide scrollbar for Chrome, Safari, Edge */
      *::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }

      .font-Helv {
        font-family: "Helvetica Now Display";
      }

      .blur-box {
        position: absolute;
        transform: translate(-50%, -50%);
        top: 71%;
        left: 50%;
        backdrop-filter: blur(9px);
        -webkit-backdrop-filter: blur(9px);
      }
      label input[type="checkbox"] {
        appearance: none;
        width: 18px;
        height: 18px;
        border: 2px solid #ffdab9;
        border-radius: 50%;
      }

      label input[type="checkbox"]:checked {
        background: #ffdab9;
        border-color: #ffdab9;
      }
    </style>
  </head>
  <body>
    <main class="min-h-screen w-full bg-neutral-950 p-2">
      <section
        class="min-h-2screen w-full page1 flex flex-col items-center justify-center gap-4 p-2"
      >
        <div
          class="searchBar h-18 w-full flex items-center justify-center gap-2"
        >
          <input
            type="text"
            class="h-14 rounded-full w-1/4 bg-amber-300 text-neutral-950 font-semibold tracking-normal font-Helv px-4 placeholder:text-amber-800 placeholder:font-bold placeholder:tracking-tight focus:outline-none"
            placeholder="Search here"
          />
          <div
            class="searchIcon h-14 w-1/3 px-5 py-2 font-Helv bg-amber-400 rounded-full flex items-center justify-between uppercase relative"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="22"
              height="22"
              fill="currentColor"
              class="bi bi-funnel-fill text-orange-700"
              viewBox="0 0 16 16"
            >
              <path
                d="M1.5 1.5A.5.5 0 0 1 2 1h12a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-.128.334L10 8.692V13.5a.5.5 0 0 1-.342.474l-3 1A.5.5 0 0 1 6 14.5V8.692L1.628 3.834A.5.5 0 0 1 1.5 3.5z"
              />
            </svg>
            <div class="flex items-center justify-center gap-4 h-full">
              <label
                for="groc"
                class="bg-orange-400 px-4 py-2 rounded-full text-orange-800 font-Helv font-semibold flex items-center justify-center gap-2 cursor-pointer"
              >
                <input
                  type="checkbox"
                  id="groc"
                  name="Groceries"
                  class="appearance-none w-5 h-5 min-w-5 min-h-5 border-2 border-amber-400 rounded relative cursor-pointer checked:bg-amber-400 flex-shrink-0"
                />
                Groceries
              </label>

              <label
                for="elec"
                class="bg-orange-400 px-4 py-2 rounded-full text-orange-800 font-Helv font-semibold flex items-center justify-center gap-2 cursor-pointer"
              >
                <input
                  type="checkbox"
                  id="elec"
                  name="Electronics"
                  class="appearance-none w-5 h-5 min-w-5 min-h-5 border-2 border-amber-400 rounded relative cursor-pointer checked:bg-amber-400 flex-shrink-0"
                />
                Electronics
              </label>
            </div>
          </div>
        </div>

        <div
          class="cards flex items-center justify-center relative flex-wrap gap-4"
        ></div>
      </section>
    </main>
  </body>
  <script src="script.js"></script>
</html>
